name: Wear Build Check

# Regression guard for the WearOS variant.
#
# The wear variant shares the `main` source set with mobile but is easy to break
# without noticing, because day-to-day development targets the phone: `main` code
# can start depending on mobile-only classes / signatures and the wear build then
# fails to compile (this happened and was repaired on the dev-watch branch).
#
# This job compiles the wear variant's Java + Kotlin (no native/NDK, no packaging)
# so such main<->wear divergence is caught in CI. It intentionally does NOT build
# the native libg.so or a full APK (that needs the NDK + submodules and is much
# heavier); a periodic/manual full assemble can cover the native side separately.
#
# It also runs the full :Common unit-test suite (testMobileLibre3SiDexGoogleDebug
# UnitTest). This shares the `main` source set, so any pure-JVM regression - not
# just AiDex detection - is caught here rather than slipping through on a filtered
# subset.

# Manual-only by request: this check no longer runs automatically on push or
# pull_request. Trigger it yourself from the Actions tab (Run workflow) when you
# want to verify the wear variant. To re-enable automatic runs, uncomment the
# push:/pull_request: blocks below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main, dev-watch]
  #   paths:
  #     - 'Common/src/main/**'
  #     - 'Common/src/mobile/**'
  #     - 'Common/src/test/**'
  #     - 'Common/src/wear/**'
  #     - 'Common/src/wearSi/**'
  #     - 'Common/build.gradle'
  #     - 'gradle.properties'
  #     - '.github/workflows/wear-build-check.yml'
  # pull_request:
  #   branches: [main, dev-watch]
  #   paths:
  #     - 'Common/src/main/**'
  #     - 'Common/src/mobile/**'
  #     - 'Common/src/test/**'
  #     - 'Common/src/wear/**'
  #     - 'Common/src/wearSi/**'
  #     - 'Common/build.gradle'
  #     - 'gradle.properties'

jobs:
  wear-compile:
    name: Compile wear variant (Java + Kotlin)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        # Linux runners honour git symlinks natively, so the wear/wearSi symlinked
        # sources materialise correctly (unlike a Windows checkout without
        # Developer Mode). Submodules are not needed for the Java/Kotlin compile.

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-wearcheck-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-wearcheck-

      - name: Compile wear variant sources
        run: |
          ./gradlew :Common:compileWearLibre3SiDexGoogleDebugJavaWithJavac \
            --no-daemon \
            --warning-mode=all

      - name: Run Common unit tests (full suite)
        run: |
          ./gradlew :Common:testMobileLibre3SiDexGoogleDebugUnitTest \
            --no-daemon

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wear-build-check-report
          path: |
            Common/build/reports/tests/testMobileLibre3SiDexGoogleDebugUnitTest/
            Common/build/test-results/testMobileLibre3SiDexGoogleDebugUnitTest/
